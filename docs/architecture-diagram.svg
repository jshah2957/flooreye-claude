<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="cloudBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBF5FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="edgeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="clientBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
    <linearGradient id="extBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF2F8"/>
      <stop offset="100%" stop-color="#FCE7F3"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B7280"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#F8FAFC" rx="8"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">FloorEye v3.0 — System Architecture</text>
  <text x="600" y="52" text-anchor="middle" font-size="11" fill="#64748B">Enterprise AI Wet Floor &amp; Spill Detection Platform</text>

  <!-- ═══ CLIENT TIER ═══ -->
  <rect x="30" y="68" width="340" height="140" rx="12" fill="url(#clientBg)" stroke="#F97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#C2410C">CLIENT TIER</text>

  <!-- Web Browser -->
  <rect x="50" y="100" width="135" height="90" rx="8" fill="white" stroke="#FB923C" stroke-width="1"/>
  <text x="117" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Web Dashboard</text>
  <text x="117" y="135" text-anchor="middle" font-size="8" fill="#64748B">React 18 + TypeScript</text>
  <text x="117" y="147" text-anchor="middle" font-size="8" fill="#64748B">Vite + TanStack Query</text>
  <text x="117" y="159" text-anchor="middle" font-size="8" fill="#64748B">Tailwind + Recharts</text>
  <text x="117" y="175" text-anchor="middle" font-size="7" fill="#9CA3AF">32 pages · WebSocket</text>

  <!-- Mobile App -->
  <rect x="215" y="100" width="135" height="90" rx="8" fill="white" stroke="#FB923C" stroke-width="1"/>
  <text x="282" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#1E293B">Mobile App</text>
  <text x="282" y="135" text-anchor="middle" font-size="8" fill="#64748B">React Native 0.81</text>
  <text x="282" y="147" text-anchor="middle" font-size="8" fill="#64748B">Expo SDK 54</text>
  <text x="282" y="159" text-anchor="middle" font-size="8" fill="#64748B">Expo Router 6</text>
  <text x="282" y="175" text-anchor="middle" font-size="7" fill="#9CA3AF">iOS + Android · FCM push</text>

  <!-- ═══ EXTERNAL INTEGRATIONS ═══ -->
  <rect x="830" y="68" width="340" height="140" rx="12" fill="url(#extBg)" stroke="#EC4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1000" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#BE185D">EXTERNAL SERVICES</text>

  <rect x="850" y="100" width="95" height="42" rx="6" fill="white" stroke="#F472B6" stroke-width="1"/>
  <text x="897" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Roboflow</text>
  <text x="897" y="132" text-anchor="middle" font-size="7" fill="#64748B">ML Platform</text>

  <rect x="955" y="100" width="95" height="42" rx="6" fill="white" stroke="#F472B6" stroke-width="1"/>
  <text x="1002" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Firebase</text>
  <text x="1002" y="132" text-anchor="middle" font-size="7" fill="#64748B">FCM Push</text>

  <rect x="1060" y="100" width="95" height="42" rx="6" fill="white" stroke="#F472B6" stroke-width="1"/>
  <text x="1107" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Cloudflare</text>
  <text x="1107" y="132" text-anchor="middle" font-size="7" fill="#64748B">TLS Tunnel</text>

  <rect x="850" y="152" width="95" height="42" rx="6" fill="white" stroke="#F472B6" stroke-width="1"/>
  <text x="897" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">SMTP</text>
  <text x="897" y="184" text-anchor="middle" font-size="7" fill="#64748B">Email Alerts</text>

  <rect x="955" y="152" width="95" height="42" rx="6" fill="white" stroke="#F472B6" stroke-width="1"/>
  <text x="1002" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Twilio</text>
  <text x="1002" y="184" text-anchor="middle" font-size="7" fill="#64748B">SMS Alerts</text>

  <rect x="1060" y="152" width="95" height="42" rx="6" fill="white" stroke="#F472B6" stroke-width="1"/>
  <text x="1107" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#1E293B">Webhooks</text>
  <text x="1107" y="184" text-anchor="middle" font-size="7" fill="#64748B">Custom HTTP</text>

  <!-- ═══ CLOUD TIER ═══ -->
  <rect x="30" y="235" width="1140" height="310" rx="12" fill="url(#cloudBg)" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#1D4ED8">CLOUD TIER — Docker Compose (7 Services)</text>

  <!-- Nginx -->
  <rect x="460" y="270" width="280" height="55" rx="8" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="600" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">Nginx Reverse Proxy</text>
  <text x="600" y="305" text-anchor="middle" font-size="8" fill="#64748B">/api/* → backend:8000  |  /storage/* → minio:9000  |  /* → React SPA</text>
  <text x="600" y="318" text-anchor="middle" font-size="7" fill="#94A3B8">Port 80 · Security Headers · GZip · WebSocket Upgrade</text>

  <!-- FastAPI Backend -->
  <rect x="270" y="340" width="370" height="85" rx="8" fill="white" stroke="#2563EB" stroke-width="1.5"/>
  <text x="455" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">FastAPI Backend</text>
  <text x="455" y="376" text-anchor="middle" font-size="8" fill="#64748B">Gunicorn + 4 Uvicorn Workers · Port 8000</text>
  <text x="455" y="390" text-anchor="middle" font-size="8" fill="#64748B">25 Routers · 95+ Endpoints · 6 WebSocket Channels</text>
  <text x="455" y="404" text-anchor="middle" font-size="8" fill="#3B82F6">AES-256-GCM Encryption · JWT HS256 Auth · RBAC (6 roles)</text>
  <text x="455" y="416" text-anchor="middle" font-size="7" fill="#94A3B8">GZip → RateLimit → CORS → SecurityHeaders → TrustedHost → Prometheus</text>

  <!-- Celery Worker -->
  <rect x="680" y="340" width="180" height="85" rx="8" fill="white" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="770" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">Celery Worker + Beat</text>
  <text x="770" y="376" text-anchor="middle" font-size="8" fill="#64748B">Detection Tasks</text>
  <text x="770" y="390" text-anchor="middle" font-size="8" fill="#64748B">Notification Tasks</text>
  <text x="770" y="404" text-anchor="middle" font-size="8" fill="#64748B">OTA · Backup · Health</text>
  <text x="770" y="416" text-anchor="middle" font-size="7" fill="#94A3B8">3 beat schedules</text>

  <!-- MongoDB -->
  <rect x="60" y="448" width="150" height="75" rx="8" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="135" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">MongoDB 7.0</text>
  <text x="135" y="486" text-anchor="middle" font-size="8" fill="#64748B">Port 27017</text>
  <text x="135" y="500" text-anchor="middle" font-size="8" fill="#64748B">22 collections</text>
  <text x="135" y="514" text-anchor="middle" font-size="7" fill="#94A3B8">TTL indexes · SCRAM auth</text>

  <!-- Redis -->
  <rect x="240" y="448" width="150" height="75" rx="8" fill="white" stroke="#DC2626" stroke-width="1.5"/>
  <text x="315" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#B91C1C">Redis 7.2</text>
  <text x="315" y="486" text-anchor="middle" font-size="8" fill="#64748B">Port 6379</text>
  <text x="315" y="500" text-anchor="middle" font-size="8" fill="#64748B">Cache · Pub/Sub · Broker</text>
  <text x="315" y="514" text-anchor="middle" font-size="7" fill="#94A3B8">3 DBs: cache, broker, results</text>

  <!-- MinIO -->
  <rect x="420" y="448" width="150" height="75" rx="8" fill="white" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="495" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#A16207">MinIO (S3)</text>
  <text x="495" y="486" text-anchor="middle" font-size="8" fill="#64748B">Port 9000 / 9001</text>
  <text x="495" y="500" text-anchor="middle" font-size="8" fill="#64748B">Frames · Models · Clips</text>
  <text x="495" y="514" text-anchor="middle" font-size="7" fill="#94A3B8">Presigned URLs · Sig v4</text>

  <!-- Prometheus -->
  <rect x="600" y="448" width="150" height="75" rx="8" fill="white" stroke="#6366F1" stroke-width="1.5"/>
  <text x="675" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#4F46E5">Prometheus</text>
  <text x="675" y="486" text-anchor="middle" font-size="8" fill="#64748B">GET /metrics</text>
  <text x="675" y="500" text-anchor="middle" font-size="8" fill="#64748B">Request latency</text>
  <text x="675" y="514" text-anchor="middle" font-size="7" fill="#94A3B8">Auto-instrumented</text>

  <!-- Cloudflared -->
  <rect x="780" y="448" width="150" height="75" rx="8" fill="white" stroke="#EC4899" stroke-width="1.5"/>
  <text x="855" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#BE185D">Cloudflare Tunnel</text>
  <text x="855" y="486" text-anchor="middle" font-size="8" fill="#64748B">Secure Ingress</text>
  <text x="855" y="500" text-anchor="middle" font-size="8" fill="#64748B">No exposed ports</text>
  <text x="855" y="514" text-anchor="middle" font-size="7" fill="#94A3B8">TLS 1.3 termination</text>

  <!-- ONNX Cloud -->
  <rect x="960" y="448" width="150" height="75" rx="8" fill="white" stroke="#0891B2" stroke-width="1.5"/>
  <text x="1035" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#0E7490">ONNX Runtime</text>
  <text x="1035" y="486" text-anchor="middle" font-size="8" fill="#64748B">Cloud Inference</text>
  <text x="1035" y="500" text-anchor="middle" font-size="8" fill="#64748B">155ms / frame</text>
  <text x="1035" y="514" text-anchor="middle" font-size="7" fill="#94A3B8">Preloaded on startup</text>

  <!-- ═══ EDGE TIER ═══ -->
  <rect x="30" y="575" width="1140" height="188" rx="12" fill="url(#edgeBg)" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="598" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">EDGE TIER — Docker Compose per Store (5 Services)</text>

  <!-- Edge Agent -->
  <rect x="60" y="610" width="300" height="75" rx="8" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="210" y="630" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">Edge Agent</text>
  <text x="210" y="646" text-anchor="middle" font-size="8" fill="#64748B">Port 8090 (web) · 8091 (config push)</text>
  <text x="210" y="660" text-anchor="middle" font-size="8" fill="#64748B">Threaded capture · Batch inference · 4-layer validation</text>
  <text x="210" y="674" text-anchor="middle" font-size="7" fill="#94A3B8">Upload with retry + failover · IoT control · Clip recording</text>

  <!-- Inference Server -->
  <rect x="390" y="610" width="175" height="75" rx="8" fill="white" stroke="#0891B2" stroke-width="1.5"/>
  <text x="477" y="630" text-anchor="middle" font-size="11" font-weight="700" fill="#0E7490">ONNX Inference</text>
  <text x="477" y="646" text-anchor="middle" font-size="8" fill="#64748B">Port 8080 (localhost)</text>
  <text x="477" y="660" text-anchor="middle" font-size="8" fill="#64748B">YOLO26n · GPU/CPU</text>
  <text x="477" y="674" text-anchor="middle" font-size="7" fill="#94A3B8">~45ms/frame · Hot-swap</text>

  <!-- go2rtc -->
  <rect x="595" y="610" width="130" height="75" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="660" y="630" text-anchor="middle" font-size="11" font-weight="700" fill="#7C3AED">go2rtc</text>
  <text x="660" y="646" text-anchor="middle" font-size="8" fill="#64748B">Port 1984</text>
  <text x="660" y="660" text-anchor="middle" font-size="8" fill="#64748B">RTSP → WebRTC</text>
  <text x="660" y="674" text-anchor="middle" font-size="7" fill="#94A3B8">Live re-streaming</text>

  <!-- Redis Buffer -->
  <rect x="755" y="610" width="130" height="75" rx="8" fill="white" stroke="#DC2626" stroke-width="1.5"/>
  <text x="820" y="630" text-anchor="middle" font-size="11" font-weight="700" fill="#B91C1C">Redis Buffer</text>
  <text x="820" y="646" text-anchor="middle" font-size="8" fill="#64748B">Port 6379</text>
  <text x="820" y="660" text-anchor="middle" font-size="8" fill="#64748B">Offline frame queue</text>
  <text x="820" y="674" text-anchor="middle" font-size="7" fill="#94A3B8">LRU eviction · 10 GB max</text>

  <!-- RTSP Cameras -->
  <rect x="915" y="610" width="130" height="75" rx="8" fill="white" stroke="#F97316" stroke-width="1.5"/>
  <text x="980" y="630" text-anchor="middle" font-size="11" font-weight="700" fill="#C2410C">RTSP Cameras</text>
  <text x="980" y="646" text-anchor="middle" font-size="8" fill="#64748B">Port 554</text>
  <text x="980" y="660" text-anchor="middle" font-size="8" fill="#64748B">IP cameras (LAN)</text>
  <text x="980" y="674" text-anchor="middle" font-size="7" fill="#94A3B8">2 FPS capture · JPEG</text>

  <!-- IoT Devices -->
  <rect x="60" y="700" width="200" height="45" rx="6" fill="white" stroke="#10B981" stroke-width="1"/>
  <text x="160" y="718" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">IoT Devices</text>
  <text x="160" y="733" text-anchor="middle" font-size="7" fill="#64748B">TP-Link · MQTT Broker · HTTP Webhooks</text>

  <!-- ═══ CONNECTION ARROWS ═══ -->

  <!-- Client → Cloud (HTTPS) -->
  <line x1="200" y1="208" x2="520" y2="270" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="340" y="234" font-size="7" fill="#F97316" font-weight="600">HTTPS</text>

  <!-- Cloud ↔ Edge (Tunnel) -->
  <line x1="600" y1="545" x2="600" y2="575" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="625" y="564" font-size="7" fill="#10B981" font-weight="600">Cloudflare Tunnel (HTTPS)</text>

  <!-- Backend → MongoDB -->
  <line x1="350" y1="425" x2="175" y2="448" stroke="#059669" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Backend → Redis -->
  <line x1="400" y1="425" x2="330" y2="448" stroke="#DC2626" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Backend → MinIO -->
  <line x1="460" y1="425" x2="485" y2="448" stroke="#CA8A04" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Backend → Prometheus -->
  <line x1="530" y1="425" x2="650" y2="448" stroke="#6366F1" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Nginx → Backend -->
  <line x1="600" y1="325" x2="500" y2="340" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Worker ↔ Redis -->
  <line x1="720" y1="425" x2="360" y2="448" stroke="#DC2626" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,2"/>

  <!-- Backend → External -->
  <line x1="640" y1="365" x2="830" y2="145" stroke="#EC4899" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="750" y="248" font-size="7" fill="#EC4899" font-weight="600">HTTPS APIs</text>

  <!-- Edge Agent → Inference -->
  <line x1="360" y1="645" x2="390" y2="645" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Edge Agent → Cameras -->
  <line x1="360" y1="660" x2="915" y2="660" stroke="#F97316" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <text x="640" y="655" font-size="7" fill="#F97316">RTSP :554</text>

  <!-- Edge Agent → IoT -->
  <line x1="160" y1="685" x2="160" y2="700" stroke="#10B981" stroke-width="1" marker-end="url(#arrowGreen)"/>

  <!-- Legend -->
  <rect x="30" y="780" width="1140" height="105" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="600" y="800" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Legend &amp; Key Metrics</text>

  <line x1="60" y1="815" x2="100" y2="815" stroke="#3B82F6" stroke-width="2"/>
  <text x="108" y="819" font-size="8" fill="#334155">HTTP/HTTPS</text>

  <line x1="200" y1="815" x2="240" y2="815" stroke="#10B981" stroke-width="2"/>
  <text x="248" y="819" font-size="8" fill="#334155">Tunnel (TLS)</text>

  <line x1="340" y1="815" x2="380" y2="815" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="388" y="819" font-size="8" fill="#334155">Redis Protocol</text>

  <line x1="490" y1="815" x2="530" y2="815" stroke="#F97316" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="538" y="819" font-size="8" fill="#334155">RTSP Stream</text>

  <rect x="640" y="808" width="12" height="12" rx="2" fill="#EBF5FF" stroke="#3B82F6"/>
  <text x="660" y="819" font-size="8" fill="#334155">Cloud Tier</text>

  <rect x="740" y="808" width="12" height="12" rx="2" fill="#ECFDF5" stroke="#10B981"/>
  <text x="760" y="819" font-size="8" fill="#334155">Edge Tier</text>

  <rect x="840" y="808" width="12" height="12" rx="2" fill="#FFF7ED" stroke="#F97316"/>
  <text x="860" y="819" font-size="8" fill="#334155">Client Tier</text>

  <rect x="940" y="808" width="12" height="12" rx="2" fill="#FDF2F8" stroke="#EC4899"/>
  <text x="960" y="819" font-size="8" fill="#334155">External APIs</text>

  <!-- Metrics row -->
  <text x="80" y="850" font-size="9" font-weight="600" fill="#1E293B">Cloud: 7 containers</text>
  <text x="250" y="850" font-size="9" font-weight="600" fill="#1E293B">Edge: 5 containers/site</text>
  <text x="440" y="850" font-size="9" font-weight="600" fill="#1E293B">95+ API endpoints</text>
  <text x="610" y="850" font-size="9" font-weight="600" fill="#1E293B">6 WebSocket channels</text>
  <text x="800" y="850" font-size="9" font-weight="600" fill="#1E293B">22 MongoDB collections</text>
  <text x="1000" y="850" font-size="9" font-weight="600" fill="#1E293B">~45ms inference</text>

  <text x="80" y="870" font-size="8" fill="#64748B">JWT HS256 + AES-256-GCM encryption</text>
  <text x="400" y="870" font-size="8" fill="#64748B">Multi-tenancy (org_id scoped) · 6-role RBAC</text>
  <text x="750" y="870" font-size="8" fill="#64748B">4-layer detection validation · Circuit breaker notifications</text>

  <text x="600" y="893" text-anchor="middle" font-size="7" fill="#94A3B8">Generated from codebase analysis · 2026-03-29 · FloorEye v3.0.0</text>
</svg>
