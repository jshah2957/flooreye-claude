version: '3.8'

services:

  # ── Inference Server (ONNX Runtime) ──────────────────────────
  inference-server:
    build:
      context: .
      dockerfile: Dockerfile.inference
    container_name: flooreye-inference
    restart: unless-stopped
    volumes:
      - ./models:/models
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - flooreye-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Edge Agent (capture, validation, upload) ─────────────────
  edge-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: flooreye-edge-agent
    restart: unless-stopped
    env_file: .env
    ports:
      - "${WEB_UI_PORT:-8090}:8090"
      - "${CONFIG_RECEIVER_PORT:-8091}:8091"
    volumes:
      - ./models:/models
      - ./data/buffer:/data/buffer
      - ./data/clips:/data/clips
      - ./data/frames:/data/frames
      - ./data/config:/data/config
      - ./data/redis:/data/redis
    depends_on:
      inference-server:
        condition: service_healthy
      redis-buffer:
        condition: service_started
    networks:
      - flooreye-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'

  # ── Cloudflare Tunnel (secure ingress) ───────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: flooreye-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - flooreye-net
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Redis Buffer (frame queue + offline buffer) ──────────────
  redis-buffer:
    image: redis:7-alpine
    container_name: flooreye-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory ${MAX_BUFFER_GB:-2}gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - flooreye-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G

networks:
  flooreye-net:
    driver: bridge
