version: '3.8'

services:

  inference-server:
    build:
      context: .
      dockerfile: Dockerfile.inference
    container_name: flooreye-inference
    restart: unless-stopped
    volumes:
      - ./models:/models
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - flooreye-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  edge-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: flooreye-edge-agent
    restart: unless-stopped
    env_file: .env
    ports:
      - "8090:8090"   # Edge web UI
      - "8091:8091"   # Config receiver (cloud pushes here)
    volumes:
      - ./models:/models
      - ./data/buffer:/data/buffer
      - ./data/clips:/data/clips
      - ./data/frames:/data/frames
      - ./data/config:/data/config  # Local camera/device config
    depends_on:
      inference-server:
        condition: service_healthy
      redis-buffer:
        condition: service_started
    networks:
      - flooreye-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: flooreye-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - flooreye-net

  redis-buffer:
    image: redis:7-alpine
    container_name: flooreye-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory ${MAX_BUFFER_GB:-2}gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - flooreye-net

networks:
  flooreye-net:
    driver: bridge
