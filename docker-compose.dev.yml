# KNOWN LIMITATIONS:
# - MinIO is NOT included in this compose file. Without it, all S3 functionality fails
#   (frame uploads, model storage, thumbnails, download URLs). To add MinIO:
#     minio:
#       image: minio/minio:latest
#       command: server /data --console-address ":9001"
#       ports:
#         - "9000:9000"
#         - "9001:9001"
#       environment:
#         MINIO_ROOT_USER: minioadmin
#         MINIO_ROOT_PASSWORD: minioadmin
#       volumes:
#         - minio_data:/data
#   Then add minio_data: under the volumes: section and create buckets "flooreye" and
#   "flooreye-learning" via the MinIO console at http://localhost:9001.
#
# - The web frontend is NOT in this compose file. Run it separately:
#     cd web && npm install && npm run dev
#   The frontend dev server runs on http://localhost:5173 by default.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "detection,notifications", "--loglevel=info", "--concurrency=2"]
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  worker-learning:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "learning", "--loglevel=info", "--concurrency=1"]
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
