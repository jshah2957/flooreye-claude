name: FloorEye CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
      - name: Lint with ruff
        run: cd backend && ruff check app/

  backend-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Run tests
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: flooreye_test
          SECRET_KEY: test-secret-key-for-ci-only
          EDGE_SECRET_KEY: test-edge-secret-for-ci
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==
          REDIS_URL: redis://localhost:6379/0
        run: cd backend && python -m pytest tests/ -v --tb=short

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd web && npm ci
      - name: Type check
        run: cd web && npx tsc --noEmit
      - name: Build
        run: cd web && npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t flooreye-backend:test -f backend/Dockerfile backend/
      - name: Build web image
        run: docker build -t flooreye-web:test -f web/Dockerfile web/
