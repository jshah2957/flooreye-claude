name: Build & Push Docker Images

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v4.9.0

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/flooreye

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.VERSION }} \
                       -t ${{ env.IMAGE_PREFIX }}-backend:latest \
                       -f backend/Dockerfile backend/
          docker push ${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.VERSION }}
          docker push ${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build and push worker image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-worker:${{ steps.version.outputs.VERSION }} \
                       -t ${{ env.IMAGE_PREFIX }}-worker:latest \
                       -f backend/Dockerfile.worker backend/
          docker push ${{ env.IMAGE_PREFIX }}-worker:${{ steps.version.outputs.VERSION }}
          docker push ${{ env.IMAGE_PREFIX }}-worker:latest

      - name: Build and push web image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-web:${{ steps.version.outputs.VERSION }} \
                       -t ${{ env.IMAGE_PREFIX }}-web:latest \
                       -f web/Dockerfile web/
          docker push ${{ env.IMAGE_PREFIX }}-web:${{ steps.version.outputs.VERSION }}
          docker push ${{ env.IMAGE_PREFIX }}-web:latest

      - name: Build and push edge-agent image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-edge-agent:${{ steps.version.outputs.VERSION }} \
                       -t ${{ env.IMAGE_PREFIX }}-edge-agent:latest \
                       -f edge-agent/Dockerfile.agent edge-agent/
          docker push ${{ env.IMAGE_PREFIX }}-edge-agent:${{ steps.version.outputs.VERSION }}
          docker push ${{ env.IMAGE_PREFIX }}-edge-agent:latest

      - name: Build and push inference-server image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}-inference:${{ steps.version.outputs.VERSION }} \
                       -t ${{ env.IMAGE_PREFIX }}-inference:latest \
                       -f edge-agent/Dockerfile.inference edge-agent/
          docker push ${{ env.IMAGE_PREFIX }}-inference:${{ steps.version.outputs.VERSION }}
          docker push ${{ env.IMAGE_PREFIX }}-inference:latest

      - name: Summary
        run: |
          echo "### Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "Version: **${{ steps.version.outputs.VERSION }}**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-worker:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-web:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-edge-agent:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_PREFIX }}-inference:${{ steps.version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
