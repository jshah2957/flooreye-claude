<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FloorEye | Enterprise Login</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#dae2fd",
              "on-secondary-container": "#5c647a",
              "on-tertiary": "#ffffff",
              "on-secondary": "#ffffff",
              "secondary": "#565e74",
              "surface-variant": "#e3e2df",
              "on-error": "#ffffff",
              "outline-variant": "#bcc9c6",
              "on-primary-container": "#f4fffc",
              "surface-container-highest": "#e3e2df",
              "secondary-fixed": "#dae2fd",
              "inverse-surface": "#2f312f",
              "on-tertiary-fixed": "#25005a",
              "on-primary": "#ffffff",
              "on-primary-fixed-variant": "#005049",
              "surface": "#faf9f6",
              "on-secondary-fixed-variant": "#3f465c",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed": "#00201d",
              "error": "#ba1a1a",
              "tertiary-fixed": "#eaddff",
              "surface-dim": "#dbdad7",
              "primary-fixed-dim": "#6bd8cb",
              "primary-container": "#008378",
              "on-tertiary-fixed-variant": "#5a00c6",
              "outline": "#6d7a77",
              "surface-container": "#efeeeb",
              "tertiary-container": "#8a4cfc",
              "surface-container-high": "#e9e8e5",
              "tertiary": "#712ae2",
              "inverse-on-surface": "#f2f1ee",
              "tertiary-fixed-dim": "#d2bbff",
              "primary": "#00685f",
              "surface-tint": "#006a61",
              "on-background": "#1a1c1a",
              "inverse-primary": "#6bd8cb",
              "on-surface": "#1a1c1a",
              "secondary-fixed-dim": "#bec6e0",
              "on-surface-variant": "#3d4947",
              "on-error-container": "#93000a",
              "background": "#faf9f6",
              "surface-container-low": "#f4f3f0",
              "on-secondary-fixed": "#131b2e",
              "primary-fixed": "#89f5e7",
              "error-container": "#ffdad6",
              "surface-bright": "#faf9f6",
              "on-tertiary-container": "#fffbff"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #faf9f6; /* Surface/Background */
      }
      .label-sm {
        font-size: 0.6875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
      }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-6 antialiased text-on-surface">
<!-- Brand Identity Header -->
<header class="mb-10 text-center">
<div class="flex flex-col items-center gap-3">
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-primary text-white shadow-lg">
<span class="material-symbols-outlined text-3xl" data-icon="water_drop">water_drop</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-on-surface">FloorEye</h1>
<p class="text-on-surface-variant text-sm font-medium">See Every Drop. Stop Every Slip.</p>
</div>
</header>
<!-- Error Banner (Initially Visible for Demo context) -->
<div class="w-full max-w-md mb-4 animate-in fade-in duration-500">
<div class="bg-error-container border-l-4 border-error p-4 rounded-lg flex items-center gap-3">
<span class="material-symbols-outlined text-error" data-icon="error">error</span>
<p class="text-sm font-medium text-on-error-container">Invalid credentials. Please check your email or password.</p>
</div>
</div>
<!-- Login Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_12px_32px_-4px_rgba(26,28,26,0.06)] overflow-hidden border border-outline-variant/20">
<div class="p-8">
<h2 class="text-xl font-bold text-on-surface mb-8">Sign in to FloorEye</h2>
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="label-sm text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-low text-on-surface border-0 rounded-lg focus:ring-2 focus:ring-primary transition-all text-sm outline-none placeholder:text-outline" id="email" name="email" placeholder="you@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="label-sm text-on-surface-variant" for="password">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-12 py-3 bg-surface-container-low text-on-surface border-0 rounded-lg focus:ring-2 focus:ring-primary transition-all text-sm outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-low" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block text-sm text-on-surface-variant" for="remember-me">
                        Remember this device
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full py-3 px-4 bg-gradient-to-br from-primary to-primary-container text-white text-sm font-semibold rounded-lg shadow-md hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<!-- Loading Spinner (Static version) -->
<svg class="animate-spin h-5 w-5 text-white/40" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
</svg>
                    Signing in...
                </button>
</form>
</div>
<!-- Footer Section of Card -->
<div class="bg-surface-container-low px-8 py-4 text-center">
<a class="text-sm font-medium text-primary hover:text-primary-container transition-colors" href="#">
                Forgot your password?
            </a>
</div>
</main>
<!-- External Footer Links -->
<footer class="mt-8 text-center space-y-4">
<p class="text-on-surface-variant text-xs label-sm">
            © 2024 FloorEye Enterprise Safety Systems
        </p>
<div class="flex gap-6 justify-center text-xs text-on-surface-variant">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">System Status</a>
</div>
</footer>
</body></html>
